<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Illusions of Reality</title>

  <style>
    :root { --vh: 1vh; }

    body {
      margin: 0;
      min-height: calc(var(--vh) * 100);
      background: #000;
      color: #00ff00;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
      text-align: center;
      padding: 20px;
    }

    canvas {
      width: 340px;
      height: 340px;
      border-radius: 50%;
      background: radial-gradient(circle at center, #001100 0%, #000 100%);
      box-shadow: 0 0 25px #00ff00;
      transition: transform 0.05s;
      flex-shrink: 0;
    }

    h2 { margin-bottom: 6px; }

    .subtitle {
      opacity: 0.7;
      font-size: 0.9em;
      margin-bottom: 12px;
      max-width: 720px;
      line-height: 1.4;
    }

    .controls {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      background: #001100;
      border: 1px solid #00ff00;
      color: #00ff00;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      text-transform: uppercase;
      font-size: 0.8em;
    }

    .timer {
      font-size: 1.1em;
      min-width: 80px;
    }

    .glitch-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,255,0,0.03) 0 1px,
        transparent 1px 3px
      );
      opacity: 0;
      mix-blend-mode: screen;
    }

    /* subtitle styling */
    audio::cue {
      color: #00ff00;
      background: rgba(0, 10, 0, 0.9);
      font-family: monospace;
      text-shadow: 0 0 5px #00ff00;
    }

    @media (max-height: 700px) {
      canvas {
        width: 260px;
        height: 260px;
      }
    }
  </style>
</head>

<body>

  <h2>The Illusions of Reality</h2>

  <div class="subtitle">
    The Geometry of Meaning: Realization Maps and Semantic Manifolds
  </div>

  <canvas id="turntable"></canvas>

  <div class="controls">
    <button id="play">Play</button>
    <button id="pause">Pause</button>
    <div class="timer" id="timer">00:00</div>
    <button id="loop">Loop: Off</button>
  </div>

  <div class="glitch-overlay" id="glitch"></div>

  <!-- AUDIO (single fixed source + VTT) -->
  <audio id="audio" crossorigin="anonymous">
    <source src="The_Illusions_of_Reality.mp3" type="audio/mpeg">
    <track
      src="The_Illusions_of_Reality.vtt"
      kind="subtitles"
      srclang="en"
      default>
  </audio>

  <script>
    function setVH() {
      document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
    }
    window.addEventListener('resize', setVH);
    setVH();

    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('play');
    const pauseBtn = document.getElementById('pause');
    const loopBtn = document.getElementById('loop');
    const timer = document.getElementById('timer');
    const canvas = document.getElementById('turntable');
    const ctx = canvas.getContext('2d');
    const glitch = document.getElementById('glitch');

    let rotation = 0;
    let pulse = 120;

    const dpr = window.devicePixelRatio || 1;
    canvas.width = 340 * dpr;
    canvas.height = 340 * dpr;
    ctx.scale(dpr, dpr);

    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const ctxAudio = new AudioContext();
    const analyser = ctxAudio.createAnalyser();
    analyser.fftSize = 256;

    const src = ctxAudio.createMediaElementSource(audio);
    src.connect(analyser);
    analyser.connect(ctxAudio.destination);

    const freqData = new Uint8Array(analyser.frequencyBinCount);

    function glitchEffect() {
      analyser.getByteFrequencyData(freqData);
      let bass = 0;
      for (let i = 0; i < 32; i++) bass += freqData[i];
      bass /= 32;

      const brightness = Math.min(1, bass / 180);
      pulse = 120 + brightness * 40;
      glitch.style.opacity = brightness > 0.2 ? brightness : 0;

      requestAnimationFrame(glitchEffect);
    }

    function drawTurntable() {
      ctx.clearRect(0, 0, 340, 340);
      ctx.save();
      ctx.translate(170, 170);
      ctx.rotate(rotation);

      ctx.beginPath();
      ctx.arc(0, 0, pulse, 0, Math.PI * 2);
      ctx.strokeStyle = '#00ff00';
      ctx.lineWidth = 3;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(0, 0, 20, 0, Math.PI * 2);
      ctx.fillStyle = '#00ff00';
      ctx.fill();

      ctx.restore();
    }

    function animate() {
      rotation += audio.paused ? 0.002 : 0.02;
      drawTurntable();
      requestAnimationFrame(animate);
    }

    function formatTime(sec) {
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }

    function updateTimer() {
      if (audio.duration) {
        const remaining = Math.max(0, audio.duration - audio.currentTime);
        timer.textContent = formatTime(remaining);
      }
      requestAnimationFrame(updateTimer);
    }

    playBtn.onclick = () => {
      ctxAudio.resume();
      audio.play();
      glitchEffect();
    };

    pauseBtn.onclick = () => audio.pause();

    loopBtn.onclick = () => {
      audio.loop = !audio.loop;
      loopBtn.textContent = `Loop: ${audio.loop ? 'On' : 'Off'}`;
    };

    animate();
    updateTimer();
  </script>

</body>
</html>
